<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Workspace YPI Al Azhar</title>
      <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />
      <link href="css/bootstrap.min.css" rel="stylesheet">
      <link href="datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
	  <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
      <div class="container mt-4 p-4 rounded" id="home">
          <div class="row mt-4">
              <div class="col">
                  <div class="card">
                      <div class="card-body">
                          <div class="mb-4">
                              <a href="https://pudintea.github.io" title="Kembali" class="btn btn-danger btn-sm">Kembali</a>
                          </div>
                          <div class="table-responsive">
                            <table class="table table-hover table-striped" id="datatables" width="100%" style="width:100%">
                                <thead>
                                    <tr>
                                        <th >Nama Sekolah</th>
                                        <th >Kampus</th>
                                        <th >Jenjang</th>
                    										<th >Domain</th>
                    										<th >Pengelola</th>
                    										<th >Detail</th>
                                        <th class="text-center" width="10%">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                          </div>
                      </div>
                  </div>
                  <div class="mt-4">
                       <span> Powered By : &copy Pudin Saepudin <a href="https://www.pudin.my.id" target="_blank">(www.pudin.my.id)</a> </span>
                  </div>
              </div>
          </div>
      </div>
      <script src="js/jquery-3.7.1.min.js"></script>
      <script src="js/bootstrap.bundle.min.js"></script>
      <script src="datatables/jquery.dataTables.min.js"></script>
      <script src="datatables/dataTables.bootstrap4.min.js"></script>
      <script>
          $(document).ready(function() {
              var table = $('#datatables').DataTable({
                  processing: true,
                  ajax: 'res/workspace.json',
                  order: [[0, 'asc']],
                  columns: [
                      { "data": "nama_sekolah"},
                      { "data": "kampus" },
                      { "data": "jenjang"},
                      { "data": "domain"},
					  { "data": "pengelola"},
					  {
							"data": "detail",
							"render": function(data, type, row, meta){
								if(type === 'display'){
									return '<a href="'+data+'" target="_blank" class="btn btn-sm btn-primary"><i class="fas fa-info-circle"></i></a>';
								}
								return data;
							}
						},
          				{ 
							"data": "status",
							"className": "text-center"
						}
                  ]
              });
          });
        
          function reloadTable(){
            table.DataTable().ajax.reload();
          }
      </script> 
  </body>
</html>
