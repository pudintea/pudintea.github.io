<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon"/>
    <title>Surat | Pudin Saepudin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="../datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
  </head>
  <body style="background-color: #eee;">
    <nav class="navbar navbar-expand-lg bg-info">
      <div class="container">
        <a class="navbar-brand text-white" href="/helpdesk.html">Surat</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active text-white" aria-current="page" href="/">Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section class="input-data mt-3" id="input-data">
      <div class="container">
        <div class="card">
          <div class="card-body">
            <form class="form" name="pdn-formPermohonan">
              <div class="row">
                <div class="col-md-4 col-lg-4 col-xs-12 col-sm-12">
                  <div class="mb-3">
                    <label for="inputNoAgenda" class="form-label">No Agenda</label>
                    <input type="text" class="form-control" id="inputNoAgenda" name="no_agenda" required>
                  </div>
                  <div class="mb-3">
                    <label for="inputUnit" class="form-label">Unit</label>
                    <input type="text" class="form-control" id="inputUnit" name="unit" required>
                  </div>
                  <div class="mb-3">
                    <label for="inputStatus" class="form-label">Status</label>
                    <select class="form-control" id="inputStatus" name="status">
                      <option value="Proses">Proses</option>
                      <option value="Selesai">Selesai</option>
                      <option value="Dibatalkan">Dibatalkan</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-8 col-lg-8 col-xs-12 col-sm-12">
                  <div>
                    <label for="inputHal" class="form-label">Hal</label>
                    <textarea class="form-control" id="inputHal" name="hal" rows="6" required></textarea>
                  </div>
                </div>
              </div>
              <div class="row mt-4">
                <div class="col-md-12 col-lg-12 col-xs-12 col-sm-12 text-end">
                  <button type="submit" class="btn btn-primary btn-kirim">Simpan Data</button>
                  <button class="btn btn-primary btn-loading d-none" type="button" disabled>
                    <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                    <span role="status">Loading...</span>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <section class="table-data mt-3 mb-3" id="table-data">
      <div class="container">
        <div class="card">
          <div class="card-body">
            <div class="row">
              <div class="col">
                <div class="table-responsive">
                  <table class="table" id="datatables" width="100%" style="width:100%">
                      <thead>
                          <tr>
                              <th class="text-center" width="14%">No Agenda</th>
                              <th class="text-center" >Unit</th>
                              <th >Hal</th>
                              <th class="text-center" width="10%">Status</th>
                              <th class="text-center" width="14%">Action</th>
                          </tr>
                      </thead>
                      <tbody>
                      </tbody>
                  </table>
                </div>
              </div>
            </div>
            </div>
        </div>
      </div>
    </section>
    <!-- Modal Edit -->
    <div class="modal fade" id="modalEdit" tabindex="-1" aria-labelledby="modalEditLabel" aria-hidden="true">
      <div class="modal-dialog">
        <form id="formEdit">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalEditLabel">Edit Data</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="editIdSurat" name="id_surat">
              <div class="mb-3">
                <label for="editNoAgenda" class="form-label">No Agenda</label>
                <input type="text" class="form-control" id="editNoAgenda" name="no_agenda" required>
              </div>
              <div class="mb-3">
                <label for="editUnit" class="form-label">Unit</label>
                <input type="text" class="form-control" id="editUnit" name="unit" required>
              </div>
              <div class="mb-3">
                <label for="editUnit" class="form-label">Unit</label>
                <input type="text" class="form-control" id="editUnit" name="unit" required>
              </div>
              <div class="mb-3">
                <label for="editStatus" class="form-label">Status</label>
                <select class="form-control" id="editStatus" name="status" required>
                  <option value="Proses">Proses</option>
                  <option value="Selesai">Selesai</option>
                  <option value="Dibatalkan">Dibatalkan</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="editHal" class="form-label">Hal</label>
                <textarea class="form-control" id="editHal" name="hal" rows="4" required></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
              <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <!-- Modal Hapus -->
    <div class="modal fade" id="modalDelete" tabindex="-1" aria-labelledby="modalDeleteLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalDeleteLabel">Konfirmasi Hapus</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            Apakah Anda yakin ingin menghapus data ini?
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button id="btnConfirmDelete" type="button" class="btn btn-danger">Hapus</button>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../datatables/jquery.dataTables.min.js"></script>
    <script src="../datatables/dataTables.bootstrap4.min.js"></script>
    <script>
        var table = $("#datatables");
        $(document).ready(function() {
            table.DataTable({
                processing: true,
                ajax: "https://pdn-supabase-express.vercel.app/api/surat",
                order: [[1, "asc"]],
                columns: [
                    { data: "no_agenda", "class": "align-top text-center"},
                    { data: "unit", "class": "align-top text-center"},
                    { data: "hal" },
                    { data: "status", "class": "align-top text-center"},
                    {
                      data: null,
                      class: "text-center",
                      orderable: false,
                      render: function(data, type, row) {
                        return `
                          <button class="btn btn-sm btn-warning btn-edit" data-id_surat="${row.id_surat}">Edit</button>
                          <button class="btn btn-sm btn-danger btn-delete" data-id_surat="${row.id_surat}">Hapus</button>
                        `;
                      }
                    }
                ]
            });
        });

        function reloadTable(){
            table.DataTable().ajax.reload();
        }
    </script>
    <script>
      $(document).ready(function() {
        $('form[name="pdn-formPermohonan"]').on('submit', function(e) {
          e.preventDefault(); // cegah form submit biasa
      
          var $form = $(this);
          var $btnSubmit = $form.find('.btn-kirim');
          var $btnLoading = $form.find('.btn-loading');
      
          // Tampilkan loading, sembunyikan tombol submit
          $btnSubmit.addClass('d-none');
          $btnLoading.removeClass('d-none');
      
          // Ambil data form sebagai object
          var formData = $form.serialize();

          $.ajax({
            url: 'https://pdn-supabase-express.vercel.app/api/surat',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
              no_agenda: $('#inputNoAgenda').val(),
              unit: $('#inputUnit').val(),
              status: $('#inputStatus').val(),
              hal: $('#inputHal').val()
            }),
            dataType: 'json',
            success: function(response) {
              alert('Data berhasil disimpan!');
              $('form[name="pdn-formPermohonan"]')[0].reset();
              // Reload table ya
              reloadTable();
            },
            error: function(xhr) {
              alert('Terjadi kesalahan: ' + xhr.status + ' - ' + xhr.responseText);
            },
            complete: function() {
              $btnSubmit.removeClass('d-none');
              $btnLoading.addClass('d-none');
            }
          });
          
        });
      });
      </script>
    <script>
      $(document).ready(function() {
      var dt = table.DataTable();
    
      // Event klik tombol Edit
      $('#datatables').on('click', '.btn-edit', function() {
        var id_surat = $(this).data('id_surat');
    
        // Ambil data baris sesuai no_agenda dari DataTable
        var data = dt.row($(this).parents('tr')).data();
    
        // Isi form modal edit dengan data dari row
        $('#editIdSurat').val(id_surat);
        $('#editNoAgenda').val(data.no_agenda);
        $('#editUnit').val(data.unit);
        $('#editStatus').val(data.status);
        $('#editHal').val(data.hal);
    
        // Tampilkan modal edit
        var modalEdit = new bootstrap.Modal(document.getElementById('modalEdit'));
        modalEdit.show();
      });
    
      // Submit form edit
      $('#formEdit').on('submit', function(e) {
        e.preventDefault();
        var id_surat = $('#editIdSurat').val();
        var no_agenda = $('#editNoAgenda').val();
        var unit = $('#editUnit').val();
        var status = $('#editStatus').val();
        var hal = $('#editHal').val();
    
        $.ajax({
          url: `https://pdn-supabase-express.vercel.app/api/surat/${id_surat}`,  // misal pakai RESTful
          method: 'PUT',
          contentType: 'application/json',
          data: JSON.stringify({ unit, status, hal }),
          success: function() {
            alert('Data berhasil diupdate');
            $('#modalEdit').modal('hide');  // jika pakai bootstrap 4
            // bootstrap 5 cara tutup:
            var modalEditEl = document.getElementById('modalEdit');
            var modalEdit = bootstrap.Modal.getInstance(modalEditEl);
            modalEdit.hide();
    
            reloadTable();
          },
          error: function(xhr) {
            alert('Gagal update data: ' + xhr.responseText);
          }
        });
      });
    
      var idSuratToDelete = null;
    
      // Event klik tombol Hapus
      $('#datatables').on('click', '.btn-delete', function() {
        idSuratToDelete = $(this).data('id_surat');
    
        var modalDelete = new bootstrap.Modal(document.getElementById('modalDelete'));
        modalDelete.show();
      });
    
      // Konfirmasi hapus
      $('#btnConfirmDelete').on('click', function() {
        if (!idSuratToDelete) return;
    
        $.ajax({
          url: `https://pdn-supabase-express.vercel.app/api/surat/${idSuratToDelete}`,
          method: 'DELETE',
          success: function() {
            alert('Data berhasil dihapus');
            var modalDeleteEl = document.getElementById('modalDelete');
            var modalDelete = bootstrap.Modal.getInstance(modalDeleteEl);
            modalDelete.hide();
    
            reloadTable();
          },
          error: function(xhr) {
            alert('Gagal hapus data: ' + xhr.responseText);
          }
        });
      });
    });
    </script>
  </body>
</html>
