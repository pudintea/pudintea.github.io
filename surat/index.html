<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon"/>
    <title>Surat | Pudin Saepudin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
  </head>
  <body style="background-color: #eee;">
    <nav class="navbar navbar-expand-lg bg-info">
      <div class="container">
        <a class="navbar-brand text-white" href="/helpdesk.html">Surat</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active text-white" aria-current="page" href="/">Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section class="input-data mt-3" id="input-data">
      <div class="container">
        <div class="card">
          <div class="card-body">
            <div class="row">
              <div class="col">
                <div class="alert alert-warning alert-dismissible fade show my-alert d-none" role="alert">
                  <strong>Terima Kasih!</strong>, Permohonan kamu sudah terkirim.
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
              </div>
            </div>
            <form class="form" name="pdn-formPermohonan">
              <div class="row">
                <div class="col-md-4 col-lg-4 col-xs-12 col-sm-12">
                  <div class="mb-3">
                    <label for="inputNoAgenda" class="form-label">No Agenda</label>
                    <input type="text" class="form-control" id="inputNoAgenda" name="no_agenda" required>
                  </div>
                  <div class="mb-3">
                    <label for="inputUnit" class="form-label">Unit</label>
                    <input type="text" class="form-control" id="inputUnit" name="unit" required>
                  </div>
                  <div class="mb-3">
                    <label for="inputStatus" class="form-label">Status</label>
                    <select class="form-control" id="inputStatus" name="status">
                      <option value="Proses">Proses</option>
                      <option value="Selesai">Selesai</option>
                      <option value="Dibatalkan">Dibatalkan</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-8 col-lg-8 col-xs-12 col-sm-12">
                  <div>
                    <label for="inputHal" class="form-label">Hal</label>
                    <textarea class="form-control" id="inputHal" name="hal" rows="6" required></textarea>
                  </div>
                </div>
              </div>
              <div class="row mt-4">
                <div class="col-md-12 col-lg-12 col-xs-12 col-sm-12 text-end">
                  <button type="submit" class="btn btn-primary btn-kirim">Kirim Permohonan</button>
                  <button class="btn btn-primary btn-loading d-none" type="button" disabled>
                    <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                    <span role="status">Loading...</span>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <section class="table-data mt-3 mb-3" id="table-data">
      <div class="container">
        <div class="card">
          <div class="card-body">
            <div class="row">
              <div class="col">
                <div class="table-responsive">
                  <table class="table" id="datatables" width="100%" style="width:100%">
                      <thead>
                          <tr>
                              <th class="text-center" width="14%">No Agenda</th>
                              <th class="text-center" >Unit</th>
                              <th >Hal</th>
                              <th class="text-center" width="10%">Status</th>
                          </tr>
                      </thead>
                      <tbody>
                      </tbody>
                  </table>
                </div>
              </div>
            </div>
            </div>
        </div>
      </div>
    </section>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="datatables/jquery.dataTables.min.js"></script>
    <script src="datatables/dataTables.bootstrap4.min.js"></script>
    <script>
        var table = $("#datatables");
        $(document).ready(function() {
            table.DataTable({
                processing: true,
                ajax: "https://pdn-supabase-express.vercel.app/api/surat",
                order: [[1, "asc"]],
                columns: [
                    { data: "no_agenda", "class": "align-top text-center"},
                    { data: "unit", "class": "align-top text-center"},
                    { data: "hal" },
                    { data: "status", "class": "align-top text-center"}
                ]
            });
        });

        function reloadTable(){
            table.DataTable().ajax.reload();
        }
    </script>
  </body>
</html>
